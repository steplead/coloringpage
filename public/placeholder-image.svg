<svg width="800" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="800" fill="#f9fafb"/>
  
  <!-- Border -->
  <rect x="10" y="10" width="780" height="780" fill="none" stroke="#e5e7eb" stroke-width="3" stroke-dasharray="10,10"/>
  
  <!-- Image icon with dashed outline -->
  <g transform="translate(250, 250)">
    <rect x="0" y="0" width="300" height="240" rx="8" ry="8" fill="none" stroke="#9ca3af" stroke-width="4" stroke-dasharray="15,10"/>
    
    <!-- Mountain in frame -->
    <path d="M0,240 L100,140 L150,190 L250,90 L300,240 Z" fill="#e5e7eb"/>
    
    <!-- Sun/Circle -->
    <circle cx="230" cy="70" r="20" fill="#d1d5db"/>
  </g>
  
  <!-- Text message -->
  <text x="400" y="550" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#6b7280">Image unavailable</text>
  <text x="400" y="590" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#9ca3af">Please try again later</text>
  
  <!-- Decorative elements for coloring page theme -->
  <g fill="none" stroke="#d1d5db" stroke-width="2.5">
    <!-- Crayon/pencil outline -->
    <path d="M180,650 L200,630 L220,650 L220,700 L180,700 Z"/>
    <path d="M190,630 L210,630"/>
    <path d="M180,680 L220,680"/>
    
    <!-- Paint brush outline -->
    <path d="M600,650 C600,650 580,670 580,690 C580,710 600,720 600,720 C600,720 620,710 620,690 C620,670 600,650 600,650 Z"/>
    <path d="M600,650 L600,620"/>
    <path d="M590,620 L610,620"/>
  </g>
  
  <!-- Dotted circles suggesting coloring theme -->
  <circle cx="140" cy="140" r="30" fill="none" stroke="#d1d5db" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="660" cy="140" r="30" fill="none" stroke="#d1d5db" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="140" cy="660" r="30" fill="none" stroke="#d1d5db" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="660" cy="660" r="30" fill="none" stroke="#d1d5db" stroke-width="2" stroke-dasharray="5,5"/>
</svg> 