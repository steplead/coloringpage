<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1e3a8a" />
  <rect width="800" height="250" y="250" fill="#065f46" />
  
  <!-- Stadium lines -->
  <g stroke="white" stroke-width="2" fill="none" opacity="0.5">
    <!-- Field center circle -->
    <circle cx="400" cy="375" r="70" />
    <circle cx="400" cy="375" r="5" fill="white" />
    
    <!-- Field center line -->
    <line x1="0" y1="375" x2="800" y2="375" />
    
    <!-- Field side lines -->
    <rect x="50" y="300" width="700" height="150" />
    
    <!-- Penalty areas -->
    <rect x="50" y="325" width="100" height="100" />
    <rect x="650" y="325" width="100" height="100" />
    
    <!-- Goal areas -->
    <rect x="50" y="350" width="50" height="50" />
    <rect x="700" y="350" width="50" height="50" />
  </g>
  
  <!-- Basketball -->
  <g transform="translate(200, 120)">
    <circle cx="0" cy="0" r="50" fill="#e97451" />
    <path d="M0,-50 C30,-50 50,-30 50,0 C50,30 30,50 0,50 C-30,50 -50,30 -50,0 C-50,-30 -30,-50 0,-50" 
          stroke="black" stroke-width="2" fill="none" />
    <path d="M-50,0 L50,0" stroke="black" stroke-width="2" fill="none" />
    <path d="M0,-50 L0,50" stroke="black" stroke-width="2" fill="none" />
  </g>
  
  <!-- Tennis racket -->
  <g transform="translate(600, 120) rotate(30)">
    <!-- Racket frame -->
    <ellipse cx="0" cy="0" rx="35" ry="50" fill="none" stroke="#333" stroke-width="8" />
    
    <!-- Racket handle -->
    <rect x="-5" y="50" width="10" height="50" fill="#333" />
    <rect x="-8" y="100" width="16" height="10" rx="5" ry="5" fill="#333" />
    
    <!-- Racket strings -->
    <g stroke="#ddd" stroke-width="1">
      <!-- Vertical strings -->
      <line x1="-30" y1="-40" x2="-30" y2="40" />
      <line x1="-20" y1="-45" x2="-20" y2="45" />
      <line x1="-10" y1="-48" x2="-10" y2="48" />
      <line x1="0" y1="-50" x2="0" y2="50" />
      <line x1="10" y1="-48" x2="10" y2="48" />
      <line x1="20" y1="-45" x2="20" y2="45" />
      <line x1="30" y1="-40" x2="30" y2="40" />
      
      <!-- Horizontal strings -->
      <line x1="-35" y1="-30" x2="35" y2="-30" />
      <line x1="-35" y1="-20" x2="35" y2="-20" />
      <line x1="-35" y1="-10" x2="35" y2="-10" />
      <line x1="-35" y1="0" x2="35" y2="0" />
      <line x1="-35" y1="10" x2="35" y2="10" />
      <line x1="-35" y1="20" x2="35" y2="20" />
      <line x1="-35" y1="30" x2="35" y2="30" />
    </g>
    
    <!-- Tennis ball -->
    <circle cx="-60" cy="-20" r="15" fill="#c3ff68" stroke="#b7ed55" stroke-width="1" />
    <path d="M-70,-25 C-65,-15 -60,-10 -50,-15" fill="none" stroke="white" stroke-width="1" />
  </g>
  
  <!-- Soccer ball -->
  <g transform="translate(400, 375)">
    <circle cx="0" cy="0" r="30" fill="white" stroke="#333" stroke-width="1" />
    
    <!-- Soccer ball pattern -->
    <g fill="#333">
      <polygon points="0,-30 10,-20 5,-5 -5,-5 -10,-20" />
      <polygon points="0,30 10,20 5,5 -5,5 -10,20" />
      <polygon points="30,0 20,10 5,5 5,-5 20,-10" />
      <polygon points="-30,0 -20,10 -5,5 -5,-5 -20,-10" />
      <polygon points="15,15 25,5 15,-5 5,5" />
      <polygon points="-15,15 -5,5 -15,-5 -25,5" />
      <polygon points="15,-15 5,-5 15,5 25,-5" />
      <polygon points="-15,-15 -25,-5 -15,5 -5,-5" />
    </g>
  </g>
  
  <!-- Baseball and bat -->
  <g transform="translate(100, 375)">
    <!-- Baseball bat -->
    <g transform="rotate(45)">
      <rect x="-5" y="-80" width="10" height="60" fill="#8b4513" />
      <path d="M-5,-20 L-10,20 L10,20 L5,-20 Z" fill="#8b4513" />
      <rect x="-2" y="-90" width="4" height="10" fill="#8b4513" />
    </g>
    
    <!-- Baseball -->
    <circle cx="30" cy="-30" r="15" fill="white" stroke="#red" stroke-width="1" />
    <path d="M20,-35 C25,-30 35,-30 40,-35" fill="none" stroke="red" stroke-width="1" />
    <path d="M20,-25 C25,-30 35,-30 40,-25" fill="none" stroke="red" stroke-width="1" />
  </g>
  
  <!-- Football -->
  <g transform="translate(700, 375)">
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="#964B00" />
    <line x1="-20" y1="0" x2="20" y2="0" stroke="white" stroke-width="2" />
    <line x1="-15" y1="-5" x2="15" y2="-5" stroke="white" stroke-width="1" />
    <line x1="-15" y1="5" x2="15" y2="5" stroke="white" stroke-width="1" />
  </g>
  
  <!-- Hockey stick and puck -->
  <g transform="translate(550, 375)">
    <!-- Hockey stick -->
    <path d="M-20,20 L0,-30 L5,-30 L-10,20 Z" fill="#964B00" />
    <path d="M-20,20 L-40,25 L-38,15 L-10,20 Z" fill="#964B00" />
    
    <!-- Hockey puck -->
    <ellipse cx="-30" cy="0" rx="10" ry="5" fill="#333" />
  </g>
  
  <!-- Golf club and ball -->
  <g transform="translate(250, 375)">
    <!-- Golf club -->
    <line x1="20" y1="-30" x2="0" y2="20" stroke="#333" stroke-width="2" />
    <path d="M25,-35 L20,-30 L25,-25" fill="none" stroke="#333" stroke-width="4" />
    
    <!-- Golf ball -->
    <circle cx="35" cy="-40" r="8" fill="white" stroke="#ddd" stroke-width="1" />
    <circle cx="33" cy="-42" r="1" fill="#ddd" />
    <circle cx="37" cy="-38" r="1" fill="#ddd" />
    <circle cx="35" cy="-40" r="1" fill="#ddd" />
  </g>
  
  <!-- Table tennis paddle and ball -->
  <g transform="translate(500, 125)">
    <!-- Paddle -->
    <rect x="-15" y="-30" width="30" height="50" rx="15" ry="15" fill="#ff4d4d" />
    <rect x="-10" y="20" width="20" height="25" fill="#333" />
    
    <!-- Ball -->
    <circle cx="25" cy="0" r="7" fill="white" />
  </g>
  
  <!-- Basketball hoop -->
  <g transform="translate(300, 125)">
    <!-- Backboard -->
    <rect x="-30" y="-50" width="60" height="40" fill="white" stroke="#333" stroke-width="2" />
    <rect x="-20" y="-10" width="40" height="5" fill="white" stroke="#333" stroke-width="2" />
    
    <!-- Rim -->
    <circle cx="0" cy="10" r="15" fill="none" stroke="#ff4d4d" stroke-width="3" />
    
    <!-- Net lines (simplified) -->
    <line x1="-10" y1="10" x2="-5" y2="30" stroke="white" stroke-width="1" />
    <line x1="-5" y1="10" x2="-2" y2="30" stroke="white" stroke-width="1" />
    <line x1="0" y1="10" x2="0" y2="30" stroke="white" stroke-width="1" />
    <line x1="5" y1="10" x2="2" y2="30" stroke="white" stroke-width="1" />
    <line x1="10" y1="10" x2="5" y2="30" stroke="white" stroke-width="1" />
  </g>
  
  <!-- Swimming lanes -->
  <g transform="translate(400, 220)">
    <rect x="-150" y="-30" width="300" height="60" fill="#4da6ff" />
    <line x1="-150" y1="-10" x2="150" y2="-10" stroke="white" stroke-width="2" />
    <line x1="-150" y1="10" x2="150" y2="10" stroke="white" stroke-width="2" />
    <line x1="-100" y1="-30" x2="-100" y2="30" stroke="white" stroke-width="1" />
    <line x1="-50" y1="-30" x2="-50" y2="30" stroke="white" stroke-width="1" />
    <line x1="0" y1="-30" x2="0" y2="30" stroke="white" stroke-width="1" />
    <line x1="50" y1="-30" x2="50" y2="30" stroke="white" stroke-width="1" />
    <line x1="100" y1="-30" x2="100" y2="30" stroke="white" stroke-width="1" />
  </g>
  
  <!-- Running track -->
  <g transform="translate(400, 50)">
    <path d="M-200,0 A200,30 0 0,0 200,0" stroke="#ff6b35" stroke-width="20" fill="none" />
    <path d="M-180,0 A180,25 0 0,0 180,0" stroke="#ff6b35" stroke-width="5" fill="none" />
    <path d="M-160,0 A160,20 0 0,0 160,0" stroke="white" stroke-width="2" fill="none" />
    <path d="M-140,0 A140,15 0 0,0 140,0" stroke="#ff6b35" stroke-width="5" fill="none" />
    <path d="M-120,0 A120,10 0 0,0 120,0" stroke="white" stroke-width="2" fill="none" />
  </g>
  
  <!-- Text Label at bottom -->
  <rect x="0" y="440" width="800" height="60" fill="rgba(0,0,0,0.7)" />
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="30" fill="white" text-anchor="middle" font-weight="bold">Sports</text>
</svg> 