<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#fdf2f8" />
  <rect width="800" height="500" fill="#fff1f2" opacity="0.7" />
  
  <!-- Decorative patterns -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="80" fill="#f43f5e" />
    <circle cx="700" cy="400" r="120" fill="#f43f5e" />
    <circle cx="200" cy="450" r="50" fill="#f43f5e" />
    <circle cx="650" cy="150" r="70" fill="#f43f5e" />
  </g>
  
  <!-- Main plate -->
  <circle cx="400" cy="250" r="180" fill="white" stroke="#e5e7eb" stroke-width="3" />
  <circle cx="400" cy="250" r="170" fill="white" stroke="#e5e7eb" stroke-width="1" />
  
  <!-- Pizza slice -->
  <g transform="translate(320, 160)">
    <path d="M0,0 L100,80 A120,120 0 0,1 80,100 Z" fill="#fbbf24" stroke="#92400e" stroke-width="1" />
    <circle cx="25" cy="25" r="8" fill="#ef4444" />
    <circle cx="50" cy="40" r="8" fill="#ef4444" />
    <circle cx="70" cy="70" r="8" fill="#ef4444" />
    <circle cx="40" cy="60" r="5" fill="#22c55e" />
    <circle cx="65" cy="30" r="5" fill="#22c55e" />
    <circle cx="85" cy="50" r="5" fill="#22c55e" />
  </g>
  
  <!-- Burger -->
  <g transform="translate(450, 170)">
    <!-- Bottom bun -->
    <path d="M-40,40 Q-40,50 -30,50 L30,50 Q40,50 40,40 L40,35 Q40,30 35,30 L-35,30 Q-40,30 -40,35 Z" fill="#f59e0b" />
    
    <!-- Lettuce -->
    <path d="M-40,30 C-30,25 -20,28 -10,25 C0,22 10,25 20,22 C30,25 40,23 40,30 Z" fill="#84cc16" />
    
    <!-- Patty -->
    <ellipse cx="0" cy="20" rx="40" ry="10" fill="#7c2d12" />
    
    <!-- Tomato -->
    <ellipse cx="0" cy="10" rx="35" ry="5" fill="#ef4444" />
    
    <!-- Cheese -->
    <path d="M-35,5 L35,5 L40,0 L30,-5 L-30,-5 L-40,0 Z" fill="#facc15" />
    
    <!-- Top bun -->
    <path d="M-35,-5 Q-40,-5 -40,-10 Q-40,-30 0,-40 Q40,-30 40,-10 Q40,-5 35,-5 Z" fill="#f59e0b" />
    <ellipse cx="0" cy="-30" rx="10" ry="5" fill="#f8fafc" />
  </g>
  
  <!-- Pasta -->
  <g transform="translate(350, 300)">
    <ellipse cx="0" cy="0" rx="60" ry="30" fill="#fed7aa" />
    <path d="M-40,-10 C-30,0 -20,-5 -10,5 C0,-5 10,0 20,-10 C30,0 40,-5 50,5" fill="none" stroke="#fde68a" stroke-width="3" stroke-linecap="round" />
    <path d="M-50,0 C-40,10 -30,5 -20,15 C-10,5 0,10 10,0 C20,10 30,5 40,15" fill="none" stroke="#fde68a" stroke-width="3" stroke-linecap="round" />
    <path d="M-30,-5 C-20,5 -10,0 0,10 C10,0 20,5 30,-5" fill="none" stroke="#fde68a" stroke-width="3" stroke-linecap="round" />
    <circle cx="-20" cy="-5" r="5" fill="#ef4444" />
    <circle cx="10" cy="5" r="5" fill="#ef4444" />
    <circle cx="30" cy="-10" r="5" fill="#ef4444" />
    <path d="M-10,-15 L-5,-5 L0,-15 L5,-5 L10,-15" fill="none" stroke="#84cc16" stroke-width="1" />
  </g>
  
  <!-- Sushi rolls -->
  <g transform="translate(450, 350)">
    <!-- Roll 1 -->
    <rect x="-50" y="-15" width="30" height="30" rx="5" ry="5" fill="#f97316" stroke="#0f172a" stroke-width="1" />
    <rect x="-45" y="-10" width="20" height="20" rx="3" ry="3" fill="white" />
    <line x1="-40" y1="-5" x2="-30" y2="-5" stroke="#22c55e" stroke-width="2" />
    <line x1="-40" y1="0" x2="-30" y2="0" stroke="#ef4444" stroke-width="2" />
    <line x1="-40" y1="5" x2="-30" y2="5" stroke="#22c55e" stroke-width="2" />
    
    <!-- Roll 2 -->
    <circle cx="-5" cy="0" r="15" fill="white" stroke="#0f172a" stroke-width="1" />
    <circle cx="-5" cy="0" r="10" fill="#f97316" />
    <path d="M-10,-5 L0,-5 L0,5 L-10,5 Z" fill="#84cc16" />
    
    <!-- Roll 3 -->
    <rect x="15" y="-15" width="30" height="30" rx="5" ry="5" fill="#f97316" stroke="#0f172a" stroke-width="1" />
    <rect x="20" y="-10" width="20" height="20" rx="3" ry="3" fill="white" />
    <circle cx="30" cy="0" r="5" fill="#ef4444" />
  </g>
  
  <!-- Ice cream -->
  <g transform="translate(250, 230)">
    <!-- Cone -->
    <path d="M-20,20 L0,60 L20,20 Z" fill="#fde68a" stroke="#92400e" stroke-width="1" />
    <line x1="-15" y1="30" x2="15" y2="30" stroke="#92400e" stroke-width="1" />
    <line x1="-10" y1="40" x2="10" y2="40" stroke="#92400e" stroke-width="1" />
    <line x1="-5" y1="50" x2="5" y2="50" stroke="#92400e" stroke-width="1" />
    
    <!-- Scoops -->
    <circle cx="0" cy="0" r="20" fill="#f9a8d4" stroke="#e5e7eb" stroke-width="1" />
    <circle cx="-10" cy="-15" r="15" fill="#fda4af" stroke="#e5e7eb" stroke-width="1" />
    <circle cx="10" cy="-15" r="15" fill="#c4b5fd" stroke="#e5e7eb" stroke-width="1" />
    
    <!-- Toppings -->
    <circle cx="-5" cy="-25" r="3" fill="#fef08a" />
    <circle cx="12" cy="-25" r="3" fill="#fef08a" />
    <circle cx="0" cy="-10" r="3" fill="#fef08a" />
    <rect x="-2" y="-40" width="4" height="10" fill="#ef4444" />
    <circle cx="0" cy="-40" r="4" fill="#ef4444" />
  </g>
  
  <!-- Fruits -->
  <g transform="translate(280, 350)">
    <!-- Apple -->
    <circle cx="-30" cy="0" r="15" fill="#ef4444" />
    <path d="M-30,-15 C-25,-25 -35,-25 -30,-15" fill="none" stroke="#84cc16" stroke-width="2" />
    
    <!-- Banana -->
    <path d="M0,-10 C10,-20 30,-15 30,0 C30,10 20,15 10,10 C0,5 -5,0 0,-10 Z" fill="#facc15" />
    <path d="M15,-5 C20,-5 25,-2 25,5" fill="none" stroke="#0f172a" stroke-width="1" />
    
    <!-- Orange -->
    <circle cx="-10" cy="20" r="15" fill="#f97316" />
    <path d="M-10,10 C-5,5 -15,5 -10,10" fill="none" stroke="#84cc16" stroke-width="2" />
    <line x1="-10" y1="5" x2="-10" y2="12" stroke="#84cc16" stroke-width="2" />
  </g>
  
  <!-- Drink -->
  <g transform="translate(530, 280)">
    <!-- Glass -->
    <path d="M-15,-40 L-20,40 C-20,45 20,45 20,40 L15,-40 Z" fill="#bae6fd" stroke="#0f172a" stroke-width="1" />
    <path d="M-15,-40 L15,-40 L15,-45 L-15,-45 Z" fill="#f8fafc" stroke="#0f172a" stroke-width="1" />
    
    <!-- Straw -->
    <path d="M0,-45 L10,-70 L12,-69 L2,-44" fill="#ec4899" />
    
    <!-- Ice cubes -->
    <rect x="-10" y="-30" width="8" height="8" rx="1" ry="1" fill="#f8fafc" opacity="0.7" />
    <rect x="2" y="-25" width="8" height="8" rx="1" ry="1" fill="#f8fafc" opacity="0.7" />
    <rect x="-5" y="-15" width="8" height="8" rx="1" ry="1" fill="#f8fafc" opacity="0.7" />
    
    <!-- Lemon slice -->
    <circle cx="5" cy="15" r="10" fill="#fef08a" stroke="#0f172a" stroke-width="1" />
    <circle cx="5" cy="15" r="5" fill="white" stroke="#0f172a" stroke-width="1" />
    <line x1="5" y1="5" x2="5" y2="25" stroke="#0f172a" stroke-width="1" />
    <line x1="-5" y1="15" x2="15" y2="15" stroke="#0f172a" stroke-width="1" />
  </g>
  
  <!-- Croissant -->
  <g transform="translate(250, 170)">
    <path d="M-30,0 C-20,-20 0,-30 20,-20 C30,-10 40,0 30,10 C20,20 0,30 -20,20 C-30,10 -40,0 -30,0 Z" fill="#fde68a" stroke="#92400e" stroke-width="1" />
    <path d="M-25,0 C-15,-15 0,-25 15,-15" fill="none" stroke="#92400e" stroke-width="1" />
    <path d="M-15,15 C0,20 15,15 25,0" fill="none" stroke="#92400e" stroke-width="1" />
    <path d="M-20,5 C-10,0 0,-5 10,0" fill="none" stroke="#92400e" stroke-width="1" />
  </g>
  
  <!-- Text Label at bottom -->
  <rect x="0" y="440" width="800" height="60" fill="rgba(0,0,0,0.7)" />
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="30" fill="white" text-anchor="middle" font-weight="bold">Food</text>
</svg> 