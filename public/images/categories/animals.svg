  <circle cx="670" cy="290" r="5" fill="#212121" />
  <path d="M640,310 Q650,320 660,310" fill="none" stroke="#212121" stroke-width="2" />
  
  <!-- Butterfly -->
  <path d="M120,150 C140,130 160,120 180,130 C200,140 200,160 190,180 C180,200 160,210 140,200 C120,190 100,170 120,150 Z" fill="#9c27b0" />
  <path d="M240,150 C220,130 200,120 180,130 C160,140 160,160 170,180 C180,200 200,210 220,200 C240,190 260,170 240,150 Z" fill="#9c27b0" />
