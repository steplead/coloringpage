name: Deploy to Vercel

on:
  push:
    branches:
      - main  # 当代码推送到main分支时触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 获取完整的Git历史

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'  # 使用Node.js 18

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Create Vercel project settings
        run: |
          cat > vercel.json << 'EOF'
          {
            "version": 2,
            "public": true,
            "github": {
              "enabled": true,
              "silent": false
            }
          }
          EOF

      - name: Deploy to Vercel (Production)
        run: |
          echo "正在部署到Vercel..."
          vercel --confirm --token=${{ secrets.VERCEL_TOKEN }} --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ 部署成功! 您的网站已更新。访问链接: https://ai-coloringpage.com"
          else
            echo "❌ 部署失败! 请检查GitHub Actions日志获取更多信息。"
          fi 